stages:
  - test
  - lint

variables:
  GO_VERSION: "1.22"

.go_template: &go_template
  image: golang:${GO_VERSION}
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .cache/go-build
      - go/pkg/mod

test:
  <<: *go_template
  stage: test
  script:
    - go mod download
    - go test -v -race -coverprofile=coverage.out ./...
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    when: always
  coverage: '/total:.*\d+.\d+%/'

lint:
  <<: *go_template
  stage: lint
  script:
    - go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
    - golangci-lint run
